agents:
  queue: hosted

cache: ".buildkite/cache-volume"

env:
  MISE_GITHUB_ATTESTATIONS: "false"
  MISE_RUBY_GITHUB_ATTESTATIONS: "false"

common_mise_plugin: &mise_plugin
  version: 2026.6.6

steps:
  - group: ":package: Native gems"
    key: native-gems
    steps:
      - label: ":package: {{matrix}} gem"
        command: |
          mise run release:build-gem
          buildkite-agent artifact upload "pkg/*-{{matrix}}.gem"
        env:
          RELEASE_PLATFORM: "{{matrix}}"
        matrix:
          - x86_64-linux
          - aarch64-linux
          - x86_64-linux-musl
          - arm64-darwin
          - x86_64-darwin
        plugins:
          - mise#v1.1.4: *mise_plugin

  - label: ":mac: Smoke install arm64-darwin gem"
    key: macos-smoke
    depends_on: native-gems
    agents:
      queue: macos
    command: |
      buildkite-agent artifact download "pkg/*-arm64-darwin.gem" .
      mise run release:smoke-install-gem
    plugins:
      - mise#v1.1.4: *mise_plugin

  - wait: ~

  # Publish only runs on a real version tag AND when not a dry run.
  # Trigger a manual build (no tag) or set DRY_RUN=true to exercise the
  # cross-compile + smoke steps without publishing to rubygems.org.
  - label: ":rubygems: Publish"
    if: build.tag != null && build.env("DRY_RUN") != "true"
    command: |
      buildkite-agent artifact download "pkg/*.gem" .
      ls -lh pkg/*.gem
      mise run release:publish-gems
    plugins:
      - mise#v1.1.4: *mise_plugin
      # rubygems-oidc role added in Phase 5
